<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #252830;
    color: #e8e8ee;
    overflow: hidden;
  }
  .plugin-frame {
    background: #2a2d36;
    border: 1px solid #3a3d48;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);

  /* Toggle Switch */

    width: 48px;
    height: 24px;
    border-radius: 12px;

    box-shadow: 
      inset 3px 3px 6px rgba(0,0,0,0.5),

    position: relative;
    cursor: pointer;
    transition: all 0.3s;
  }
  .toggle-knob {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #3a3d48;
    box-shadow:

    transition: all 0.3s;

    left: 27px;
    background: currentColor;
    box-shadow: 
      0 0 8px currentColor,
      2px 2px 4px rgba(0,0,0,0.4);
  }
  
  /* Focus Switch - 3-way neumorphic */
  .focus-switch {
    display: flex;
    gap: 4px;
    padding: 4px;
    background: #2a2d36;
    border-radius: 14px;
    box-shadow: 
      inset 3px 3px 6px rgba(0,0,0,0.5),

  }

    padding: 8px 18px;

  .focus-option.active {
    background: #2a2d36;

    box-shadow: 
      3px 3px 6px rgba(0,0,0,0.5),
      -3px -3px 6px rgba(255,255,255,0.04);
    text-shadow: 0 0 8px rgba(255,255,255,0.3);
  }
  
  /* Knob */
  .knob-container {
    position: relative;
    width: 110px;
    height: 110px;
    cursor: grab;
    transition: opacity 0.3s;
  }
  .knob-container:active { cursor: grabbing; }
  .knob-container.disabled {
    opacity: 0.3;
    pointer-events: none;
  }
  .knob-body {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #2a2d36;
    box-shadow: 
      10px 10px 20px rgba(0,0,0,0.55),
      -10px -10px 20px rgba(255,255,255,0.06);
    position: relative;
  }
  .knob-inner {
    position: absolute;
    top: 12px; left: 12px; right: 12px; bottom: 12px;
    border-radius: 50%;
    background: linear-gradient(145deg, #2e313a 0%, #24272f 100%);
    box-shadow: 
      inset 4px 4px 8px rgba(0,0,0,0.35),
      inset -2px -2px 6px rgba(255,255,255,0.04);
  }
  .knob-indicator {
    position: absolute;
    top: 6px;
    left: 50%;
    width: 3px;
    height: 18px;
    margin-left: -1.5px;
    border-radius: 2px;
    transform-origin: 50% 49px;

  .knob-ring {
    position: absolute;
    top: -8px; left: -8px; right: -8px; bottom: -8px;
    border-radius: 50%;
    border: 2px solid transparent;
    opacity: 0.4;

  /* Mode dots */
  .mode-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #2a2d36;
    box-shadow: 
      2px 2px 4px rgba(0,0,0,0.45),
      -2px -2px 4px rgba(255,255,255,0.04);
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-dot.active {
    box-shadow: 
      0 0 8px currentColor,
      0 0 12px currentColor;
  }
  
  /* Viz */
  .viz-frame {
    background: #0a0b0f;
    border: 1px solid #3a3d48;
    box-shadow: 
      inset 0 0 60px rgba(0,0,0,0.8),
      0 0 40px rgba(0,0,0,0.3);
    border-radius: 16px;
  }
  
  canvas { display: block; }

    font-size: 11px;
    letter-spacing: 0.2em;

  .mode-name {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.4);
    min-height: 12px;
  }

<script>
// --- 3D Perlin Noise ---
class PerlinNoise3D {
  constructor(seed = 0) {
    this.perm = new Uint8Array(512);
    const p = new Uint8Array(256);
    for (let i = 0; i < 256; i++) p[i] = i;
    let n = seed || Math.random() * 65536;
    for (let i = 255; i > 0; i--) {
      n = (n * 16807) % 2147483647;
      const j = n % (i + 1);
      [p[i], p[j]] = [p[j], p[i]];
    }
    for (let i = 0; i < 512; i++) this.perm[i] = p[i & 255];
  }
  fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
  lerp(a, b, t) { return a + t * (b - a); }
  grad(hash, x, y, z) {
    const h = hash & 15;
    const u = h < 8 ? x : y;
    const v = h < 4 ? y : h === 12 || h === 14 ? x : z;
    return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
  }
  noise(x, y, z) {
    const X = Math.floor(x) & 255;
    const Y = Math.floor(y) & 255;
    const Z = Math.floor(z) & 255;
    x -= Math.floor(x);
    y -= Math.floor(y);
    z -= Math.floor(z);
    const u = this.fade(x);
    const v = this.fade(y);
    const w = this.fade(z);
    const A = this.perm[X] + Y;
    const AA = this.perm[A] + Z;
    const AB = this.perm[A + 1] + Z;
    const B = this.perm[X + 1] + Y;
    const BA = this.perm[B] + Z;
    const BB = this.perm[B + 1] + Z;
    return this.lerp(
      this.lerp(
        this.lerp(this.grad(this.perm[AA], x, y, z), this.grad(this.perm[BA], x - 1, y, z), u),
        this.lerp(this.grad(this.perm[AB], x, y - 1, z), this.grad(this.perm[BB], x - 1, y - 1, z), u),
        v
      ),
      this.lerp(
        this.lerp(this.grad(this.perm[AA + 1], x, y, z - 1), this.grad(this.perm[BA + 1], x - 1, y, z - 1), u),
        this.lerp(this.grad(this.perm[AB + 1], x, y - 1, z - 1), this.grad(this.perm[BB + 1], x - 1, y - 1, z - 1), u),
        v
      ),
      w
    );
  }
}

const perlinA = new PerlinNoise3D(42);
const perlinB = new PerlinNoise3D(137);

const canvas = document.getElementById('fluidCanvas');
const ctx = canvas.getContext('2d');

// Parameter state
const state = {
  motion: { value: 35, mode: 0, color: [6, 182, 212], zone: 0, active: true },
  texture: { value: 60, mode: 0, color: [245, 158, 11], zone: 1, active: true },
  shape: { value: 20, mode: 0, color: [236, 72, 153], zone: 2, active: true },
  space: { value: 75, mode: 0, color: [99, 102, 241], zone: 3, active: true },
  focus: 'recent' // recent, balanced, ancient
};

// Transition effects
const transitions = [];

function addTransition(type, param, duration = 0.8) {
  transitions.push({
    type,
    param,
    startTime: performance.now() / 1000,
    duration,
    progress: 0
  });
}

function getTransitionEffect(time) {
  let effect = { distortion: 0, pulse: 0, wind: 0, grain: 0 };
  
  for (let i = transitions.length - 1; i >= 0; i--) {
    const t = transitions[i];
    const elapsed = time - t.startTime;
    t.progress = Math.min(1, elapsed / t.duration);
    
    if (t.progress >= 1) {
      transitions.splice(i, 1);
      continue;
    }
    
    const intensity = Math.sin(t.progress * Math.PI);
    
    if (t.type === 'pulse') effect.pulse += intensity * 0.5;
    else if (t.type === 'wind') effect.wind += intensity * 0.3;
    else if (t.type === 'grain') effect.grain += intensity * 0.4;
    else if (t.type === 'distort') effect.distortion += intensity * 0.3;
  }
  
  return effect;
}

// Mode visual characteristics
const modeCharacteristics = {
  motion: [
    { speedMod: 1.0, scaleMod: 1.0, turbulence: 0 },
    { speedMod: 1.5, scaleMod: 0.8, turbulence: 0.3 },
    { speedMod: 0.3, scaleMod: 1.2, turbulence: 0.1 },
    { speedMod: 2.5, scaleMod: 0.6, turbulence: 0.5 },
  ],
  texture: [
    { brightness: 1.2, contrast: 0.8, grain: 0 },
    { brightness: 0.9, contrast: 1.1, grain: 0.1 },
    { brightness: 1.3, contrast: 1.4, grain: 0.2 },
    { brightness: 1.0, contrast: 0.9, grain: 0 },
    { brightness: 0.8, contrast: 1.2, grain: 0.3 },
  ],
  shape: [
    { sharpness: 0.5, diffusion: 0 },
    { sharpness: 1.5, diffusion: 0 },
    { sharpness: 0.7, diffusion: 0.4 },
    { sharpness: 1.2, diffusion: 0.2 },
  ],
  space: [
    { spread: 0.8, depth: 0.5 },
    { spread: 1.2, depth: 0.8 },
    { spread: 1.5, depth: 0.6 },
    { spread: 1.0, depth: 1.5 },
  ]
};

// Focus characteristics - affects how the field behaves
const focusCharacteristics = {
  recent: { timeScale: 1.0, decay: 0.0, freshness: 1.0 },
  balanced: { timeScale: 0.7, decay: 0.5, freshness: 0.5 },
  ancient: { timeScale: 0.4, decay: 1.0, freshness: 0.0 }
};

function resize() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
}
window.addEventListener('resize', resize);
resize();

// Focus switch interaction
document.querySelectorAll('.focus-option').forEach(option => {
  option.addEventListener('click', () => {
    document.querySelectorAll('.focus-option').forEach(o => o.classList.remove('active'));
    option.classList.add('active');
    state.focus = option.dataset.focus;
    document.querySelector('[data-focus-display]').textContent = option.dataset.focus.toUpperCase();
    
    // Visual feedback for focus change
    if (state.focus === 'recent') addTransition('wind', 'focus', 0.6);
    else if (state.focus === 'ancient') addTransition('pulse', 'focus', 1.2);
  });
});

// Toggle interaction
document.querySelectorAll('.toggle-container').forEach(toggle => {
  toggle.addEventListener('click', () => {
    const param = toggle.dataset.toggle;
    const isActive = toggle.classList.toggle('active');
    state[param].active = isActive;
    
    const knob = document.querySelector(`.knob-container[data-param="${param}"]`);
    if (isActive) knob.classList.remove('disabled');
    else knob.classList.add('disabled');
  });
});

// Knob interaction
document.querySelectorAll('.knob-container').forEach(knob => {
  let isDragging = false;
  let startY = 0;
  let startValue = 0;
  const param = knob.dataset.param;
  
  const updateVisual = () => {
    const value = +knob.dataset.value;
    state[param].value = value;
    const angle = -135 + (value / 100) * 270;
    const indicator = knob.querySelector('.knob-indicator');
    indicator.style.transform = `rotate(${angle}deg)`;
  };
  
  updateVisual();
  
  knob.addEventListener('mousedown', e => {
    if (knob.classList.contains('disabled')) return;
    isDragging = true;
    startY = e.clientY;
    startValue = +knob.dataset.value;
    e.preventDefault();
  });
  
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const delta = (startY - e.clientY) * 0.5;
    const newValue = Math.max(0, Math.min(100, startValue + delta));
    knob.dataset.value = newValue;
    updateVisual();
  });
  
  window.addEventListener('mouseup', () => {
    isDragging = false;
  });
});

// Mode dot interaction with transition effects
document.querySelectorAll('[data-modes]').forEach(group => {
  const param = group.dataset.modes;
  const display = document.querySelector(`[data-mode-display="${param}"]`);
  
  group.querySelectorAll('.mode-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      group.querySelectorAll('.mode-dot').forEach(d => {
        d.classList.remove('active');
        d.style.background = '#2a2d36';
      });
      dot.classList.add('active');
      dot.style.background = dot.style.color;
      state[param].mode = +dot.dataset.mode;
      display.textContent = dot.dataset.name;
      
      const modeName = dot.dataset.name;
      if (param === 'motion') {
        if (modeName === 'PULSE') addTransition('pulse', param, 1.0);
        else if (modeName === 'FLOW') addTransition('wind', param, 0.8);
        else if (modeName === 'CHAOS') addTransition('distort', param, 0.6);
      } else if (param === 'texture') {
        if (modeName === 'CRYSTAL' || modeName === 'FABRIC') addTransition('grain', param, 0.7);
        else if (modeName === 'WATER') addTransition('wind', param, 0.9);
      } else if (param === 'shape') {
        if (modeName === 'GRAIN') addTransition('grain', param, 0.8);
        else if (modeName === 'DIFFUSE') addTransition('wind', param, 1.0);
      }
    });
  });
});

function zoneWeight(x, zoneCenter, zoneWidth) {
  const dist = Math.abs(x - zoneCenter);
  if (dist > zoneWidth) return 0;
  return Math.cos((dist / zoneWidth) * Math.PI * 0.5);
}

let t = 0;
function render() {
  const W = canvas.width;
  const H = canvas.height;
  
  const currentTime = performance.now() / 1000;
  
  // Focus affects time progression
  const focusChar = focusCharacteristics[state.focus];
  t += 0.008 * focusChar.timeScale;
  
  ctx.fillStyle = '#0a0b0f';
  ctx.fillRect(0, 0, W, H);
  
  const step = 4;
  const cols = Math.ceil(W / step);
  const rows = Math.ceil(H / step);
  
  const imgData = ctx.createImageData(W, H);
  const data = imgData.data;
  
  const transEffect = getTransitionEffect(currentTime);
  
  const motionChar = modeCharacteristics.motion[state.motion.mode];
  const textureChar = modeCharacteristics.texture[state.texture.mode];
  const shapeChar = modeCharacteristics.shape[state.shape.mode];
  const spaceChar = modeCharacteristics.space[state.space.mode];
  
  const zoneWidth = 0.25;
  
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const nx = x / cols;
      const ny = y / rows;
      
      let r = 0, g = 0, b = 0;
      
      let distortX = 0, distortY = 0;
      if (transEffect.pulse > 0) {
        const distFromCenter = Math.sqrt(Math.pow(nx - 0.5, 2) + Math.pow(ny - 0.5, 2));
        const wave = Math.sin(distFromCenter * 20 - transEffect.pulse * 10) * transEffect.pulse * 0.05;
        distortX += wave * (nx - 0.5);
        distortY += wave * (ny - 0.5);
      }
      if (transEffect.wind > 0) {
        distortX += Math.sin(ny * 10 + t * 3) * transEffect.wind * 0.03;
      }
      
      // Focus "decay" effect - ancient memories fade at edges
      let focusFade = 1.0;
      if (focusChar.decay > 0) {
        const distFromCenter = Math.sqrt(Math.pow(nx - 0.5, 2) + Math.pow(ny - 0.5, 2));
        focusFade = 1.0 - distFromCenter * focusChar.decay * 0.8;
        focusFade = Math.max(0.3, focusFade);
      }
      
      const adjNx = nx + distortX;
      const adjNy = ny + distortY;
      
      for (const [key, param] of Object.entries(state)) {
        if (key === 'focus' || !param.active) continue;
        
        const zoneCenter = (param.zone + 0.5) / 4;
        const weight = zoneWeight(adjNx, zoneCenter, zoneWidth);
        
        if (weight < 0.01) continue;
        
        const mix = param.value / 100;
        
        let speedMod = 1.0, scaleMod = 1.0, turbulence = 0;
        let brightness = 1.0, contrast = 1.0, grainAmount = 0;
        let sharpness = 1.0, diffusion = 0;
        let spread = 1.0, depth = 1.0;
        
        if (key === 'motion') {
          speedMod = motionChar.speedMod;
          scaleMod = motionChar.scaleMod;
          turbulence = motionChar.turbulence;
        } else if (key === 'texture') {
          brightness = textureChar.brightness;
          contrast = textureChar.contrast;
          grainAmount = textureChar.grain;
        } else if (key === 'shape') {
          sharpness = shapeChar.sharpness;
          diffusion = shapeChar.diffusion;
        } else if (key === 'space') {
          spread = spaceChar.spread;
          depth = spaceChar.depth;
        }
        
        const scaleA = 2.0 * scaleMod * spread;
        const speedA = 0.15 * speedMod;
        let vA = perlinA.noise(adjNx * scaleA, adjNy * scaleA, t * speedA);
        
        const scaleB = (5.0 + mix * 3.0) * scaleMod;
        const speedB = (0.5 + mix * 0.5) * speedMod;
        let vB = perlinB.noise(adjNx * scaleB, adjNy * scaleB, t * speedB);
        
        if (turbulence > 0) {
          const turb = perlinA.noise(adjNx * 8, adjNy * 8, t * 2) * turbulence;
          vA += turb;
          vB += turb;
        }
        
        let v = vA * (1 - mix) + vB * mix;
        
        // Ancient focus: add "ghost" layer - older memory echoes
        if (focusChar.decay > 0.3) {
          const ghost = perlinA.noise(adjNx * 1.5, adjNy * 1.5, t * 0.05) * focusChar.decay * 0.3;
          v += ghost;
        }
        
        v = Math.sign(v) * Math.pow(Math.abs(v), 1 / sharpness);
        
        if (diffusion > 0) {
          const blur = perlinB.noise(adjNx * 3, adjNy * 3, t * 0.5) * diffusion;
          v = v * (1 - diffusion) + blur;
        }
        
        let intensity = (v + 1) / 2;
        intensity = ((intensity - 0.5) * contrast + 0.5) * brightness;
        intensity = Math.max(0, Math.min(1, intensity));
        
        if (grainAmount > 0 || transEffect.grain > 0) {
          const grain = perlinB.noise(adjNx * 20, adjNy * 20, t * 5) * (grainAmount + transEffect.grain);
          intensity += grain * 0.2;
        }
        
        intensity *= (0.7 + depth * 0.3);
        intensity *= focusFade;
        
        r += param.color[0] * intensity * weight;
        g += param.color[1] * intensity * weight;
        b += param.color[2] * intensity * weight;
      }
      
      for (let dy = 0; dy < step && y * step + dy < H; dy++) {
        for (let dx = 0; dx < step && x * step + dx < W; dx++) {
          const idx = ((y * step + dy) * W + (x * step + dx)) * 4;
          data[idx] = Math.min(255, Math.max(0, r));
          data[idx + 1] = Math.min(255, Math.max(0, g));
          data[idx + 2] = Math.min(255, Math.max(0, b));
          data[idx + 3] = 255;
        }
      }
    }
  }
  
  ctx.putImageData(imgData, 0, 0);
  
  const grad = ctx.createRadialGradient(W/2, H/2, W*0.25, W/2, H/2, W*0.6);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  
  requestAnimationFrame(render);
}
render();
</script>
