<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Organic Audio Animator — Mockup v9</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #252830;
      color: #e8e8ee;
      overflow: hidden;
    }

    .plugin-frame {
      background: #2a2d36;
      border: 1px solid #3a3d48;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .plugin-title {
      font-family: "Cinzel", "Cinzel", serif;
    }

    .plugin-header {
      padding: 20px 32px 16px;
      text-align: center;
      position: relative;
    }

/* Wrapper für Titel + Nebel */
.plugin-title-aura {
  position: relative;
  display: inline-block;
  padding: 2px 0; /* kaum horizontaler Abstand, damit die Position nicht verrutscht */
}

/* Nebel/Glow hinter dem Titel */
.plugin-title-aura::before {
  content: "";
  position: absolute;
  inset: -20px -60px -28px; /* Ausdehnung des Nebels um den Text herum */
  background:
    radial-gradient(circle at 50% 0%,
      rgba(167, 139, 250, 0.55), transparent 60%)
    ,
    radial-gradient(circle at 0% 100%,
      rgba(56, 189, 248, 0.35), transparent 65%);
  filter: blur(26px);
  opacity: 0.75;
  z-index: -1;
  pointer-events: none;
  animation: aether-fog 12s ease-in-out infinite;
}

@keyframes aether-fog {
  0%   { transform: translate3d(0, 0, 0) scale(1);     opacity: 0.65; }
  50%  { transform: translate3d(3px, -4px, 0) scale(1.05); opacity: 0.8; }
  100% { transform: translate3d(-2px, 3px, 0) scale(1);    opacity: 0.65; }
}

/* Titel selbst */
.plugin-title {
  margin: 0; /* H1-Default-Margin entfernen, für kontrollierte Höhe */
  font-family: "Cinzel Decorative", "Cinzel", serif;
  font-size: 20px; /* etwas näher an deinem ursprünglichen text-base (~16px) */
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #f9fafb;
  text-shadow:
    0 0 12px rgba(167, 139, 250, 0.9),    /* innerer, violetter Glow */
    0 0 32px rgba(56, 189, 248, 0.4),     /* cyanfarbener Aether-Rand */
    0 0 60px rgba(15, 23, 42, 0.8);       /* dunkler Halo für mehr Tiefe */
}

/* Subheadline: Organic Memory Engine */
.plugin-subtitle {
  margin: 4px 0 0; /* entspricht ungefähr deinem bisherigen mt-1 */
  font-family: "Inter", system-ui, sans-serif;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(232, 232, 238, 0.6);
  text-shadow: 0 0 8px rgba(0, 0, 0, 0.7);
}

    /* Toggle Switch */
    .toggle-container {
      width: 44px;
      height: 22px;
      border-radius: 11px;
      background: #2a2d36;
      box-shadow: inset 3px 3px 6px rgba(0, 0, 0, 0.5), inset -3px -3px 6px rgba(255, 255, 255, 0.04);
      position: relative;
      cursor: pointer;
      transition: all 0.3s;
      flex-shrink: 0;
    }

    .toggle-knob {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #3a3d48;
      box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4), -1px -1px 3px rgba(255, 255, 255, 0.03);
      transition: all 0.3s;
    }

    .toggle-container.active .toggle-knob {
      left: 25px;
      background: currentColor;
      box-shadow: 0 0 8px currentColor, 2px 2px 4px rgba(0, 0, 0, 0.4);
    }

    /* Focus Switch */
    .focus-switch {
      display: flex;
      gap: 3px;
      padding: 3px;
      background: #2a2d36;
      border-radius: 12px;
      box-shadow: inset 3px 3px 6px rgba(0, 0, 0, 0.5), inset -3px -3px 6px rgba(255, 255, 255, 0.04);
    }

    .focus-option {
      padding: 6px 14px;
      border-radius: 9px;
      font-size: 9px;
      letter-spacing: 0.2em;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      transition: all 0.3s;
      background: transparent;
      user-select: none;
    }

    .focus-option:hover {
      color: rgba(255, 255, 255, 0.55);
    }

    .focus-option.active {
      background: #2a2d36;
      color: #e8e8ee;
      box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5), -3px -3px 6px rgba(255, 255, 255, 0.04);
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
    }

    /* Memory Orb — compact */
    .memory-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .memory-orb-zone {
      position: relative;
      width: 72px;
      height: 72px;
      cursor: grab;
      flex-shrink: 0;
    }

    .memory-orb-zone:active {
      cursor: grabbing;
    }

    .memory-orb-shell {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.07), transparent 70%);
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5), 0 0 30px rgba(139, 92, 246, 0.15);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .memory-core {
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #c4b5fd, #7c3aed);
      transition: width 0.15s, height 0.15s, box-shadow 0.15s;
      position: relative;
      z-index: 2;
    }

    .memory-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1.5px solid rgba(167, 139, 250, 0.35);
      opacity: 0;
      pointer-events: none;
      animation: ring-pulse 3s ease-out infinite;
    }

    @keyframes ring-pulse {
      0% {
        width: 16px;
        height: 16px;
        opacity: 0.7;
      }

      100% {
        width: 72px;
        height: 72px;
        opacity: 0;
      }
    }

    .memory-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .memory-meta-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      font-weight: 500;
      color: #a78bfa;
    }

    .memory-meta-value {
      font-size: 18px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .memory-meta-hint {
      font-size: 8px;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.2);
    }

    /* Knob */
    .knob-container {
      position: relative;
      width: 100px;
      height: 100px;
      cursor: grab;
      transition: opacity 0.3s;
    }

    .knob-container:active {
      cursor: grabbing;
    }

    .knob-container.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    .knob-body {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #2a2d36;
      box-shadow: 8px 8px 16px rgba(0, 0, 0, 0.55), -8px -8px 16px rgba(255, 255, 255, 0.06);
      position: relative;
    }

    .knob-inner {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      border-radius: 50%;
      background: linear-gradient(145deg, #2e313a, #24272f);
      box-shadow: inset 3px 3px 6px rgba(0, 0, 0, 0.35), inset -2px -2px 5px rgba(255, 255, 255, 0.04);
    }

    .knob-indicator {
      position: absolute;
      top: 5px;
      left: 50%;
      width: 3px;
      height: 16px;
      margin-left: -1.5px;
      border-radius: 2px;
      transform-origin: 50% 45px;
    }

    .knob-ring {
      position: absolute;
      top: -6px;
      left: -6px;
      right: -6px;
      bottom: -6px;
      border-radius: 50%;
      border: 2px solid transparent;
      opacity: 0.35;
    }

    /* Mode dots */
    .mode-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #2a2d36;
      box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.45), -2px -2px 4px rgba(255, 255, 255, 0.04);
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-dot.active {
      box-shadow: 0 0 6px currentColor, 0 0 10px currentColor;
    }

    /* Viz */
    .viz-frame {
      background: #0a0b0f;
      border: 1px solid #3a3d48;
      box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 0, 0, 0.3);
      border-radius: 14px;
    }

    canvas {
      display: block;
    }

    .param-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      font-weight: 500;
    }

    .mode-name {
      font-size: 8px;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.35);
      min-height: 11px;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Footer -->

      class="mt-6 pt-3 border-t border-white/5 flex items-center justify-between text-[8px] tracking-[0.2em] text-white/20">

        <span>◀ PREV</span><span>SAVE</span><span>NEXT ▶</span>
      </div>
    </div>

  </div>

  <script>
    class PerlinNoise3D {
      constructor(seed = 0) { this.perm = new Uint8Array(512); const p = new Uint8Array(256); for (let i = 0; i < 256; i++)p[i] = i; let n = seed || Math.random() * 65536; for (let i = 255; i > 0; i--) { n = (n * 16807) % 2147483647; const j = n % (i + 1);[p[i], p[j]] = [p[j], p[i]] } for (let i = 0; i < 512; i++)this.perm[i] = p[i & 255] }
      fade(t) { return t * t * t * (t * (t * 6 - 15) + 10) }
      lerp(a, b, t) { return a + t * (b - a) }
      grad(h, x, y, z) { const k = h & 15; const u = k < 8 ? x : y; const v = k < 4 ? y : k === 12 || k === 14 ? x : z; return ((k & 1) ? -u : u) + ((k & 2) ? -v : v) }
      noise(x, y, z) { const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255; x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z); const u = this.fade(x), v = this.fade(y), w = this.fade(z); const A = this.perm[X] + Y, AA = this.perm[A] + Z, AB = this.perm[A + 1] + Z, B = this.perm[X + 1] + Y, BA = this.perm[B] + Z, BB = this.perm[B + 1] + Z; return this.lerp(this.lerp(this.lerp(this.grad(this.perm[AA], x, y, z), this.grad(this.perm[BA], x - 1, y, z), u), this.lerp(this.grad(this.perm[AB], x, y - 1, z), this.grad(this.perm[BB], x - 1, y - 1, z), u), v), this.lerp(this.lerp(this.grad(this.perm[AA + 1], x, y, z - 1), this.grad(this.perm[BA + 1], x - 1, y, z - 1), u), this.lerp(this.grad(this.perm[AB + 1], x, y - 1, z - 1), this.grad(this.perm[BB + 1], x - 1, y - 1, z - 1), u), v), w) }
    }
    const perlinA = new PerlinNoise3D(42), perlinB = new PerlinNoise3D(137);
    const canvas = document.getElementById('fluidCanvas'), ctx = canvas.getContext('2d');

    const state = {
      motion: { value: 35, mode: 0, color: [6, 182, 212], zone: 0, active: true },
      texture: { value: 60, mode: 0, color: [245, 158, 11], zone: 1, active: true },
      shape: { value: 20, mode: 0, color: [236, 72, 153], zone: 2, active: true },
      space: { value: 75, mode: 0, color: [99, 102, 241], zone: 3, active: true },
      memory: 50, focus: 'recent'
    };

    const transitions = [];
    function addTransition(type, dur = 0.8) { transitions.push({ type, start: performance.now() / 1000, dur, progress: 0 }) }
    function getTransEffect(time) { let e = { distortion: 0, pulse: 0, wind: 0, grain: 0 }; for (let i = transitions.length - 1; i >= 0; i--) { const t = transitions[i], el = time - t.start; t.progress = Math.min(1, el / t.dur); if (t.progress >= 1) { transitions.splice(i, 1); continue } const I = Math.sin(t.progress * Math.PI); if (t.type === 'pulse') e.pulse += I * 0.5; else if (t.type === 'wind') e.wind += I * 0.3; else if (t.type === 'grain') e.grain += I * 0.4; else if (t.type === 'distort') e.distortion += I * 0.3 } return e }

    const MC = {
      motion: [{ sp: 1, sc: 1, tu: 0 }, { sp: 1.5, sc: .8, tu: .3 }, { sp: .3, sc: 1.2, tu: .1 }, { sp: 2.5, sc: .6, tu: .5 }],
      texture: [{ br: 1.2, co: .8, gr: 0 }, { br: .9, co: 1.1, gr: .1 }, { br: 1.3, co: 1.4, gr: .2 }, { br: 1, co: .9, gr: 0 }, { br: .8, co: 1.2, gr: .3 }],
      shape: [{ sh: .5, di: 0 }, { sh: 1.5, di: 0 }, { sh: .7, di: .4 }, { sh: 1.2, di: .2 }],
      space: [{ sp: .8, de: .5 }, { sp: 1.2, de: .8 }, { sp: 1.5, de: .6 }, { sp: 1, de: 1.5 }]
    };
    const FC = { recent: { ts: 1, dc: 0 }, balanced: { ts: .7, dc: .5 }, ancient: { ts: .4, dc: 1 } };

    function resize() { const r = canvas.getBoundingClientRect(); canvas.width = r.width * devicePixelRatio; canvas.height = r.height * devicePixelRatio }
    window.addEventListener('resize', resize); resize();

    // Memory Orb
    const memoryOrb = document.getElementById('memoryOrb'), memoryCore = document.getElementById('memoryCore'), memoryDisplay = document.querySelector('[data-memory-display]');
    let memDrag = false, memStartY = 0, memStartVal = 0;
    function updateMem() {
      const v = state.memory;
      memoryDisplay.textContent = Math.round(v) + '%';
      const s = 14 + (v / 100) * 32;
      memoryCore.style.width = s + 'px'; memoryCore.style.height = s + 'px';
      const g = .3 + (v / 100) * .7;
      memoryCore.style.boxShadow = `0 0 ${16 * g}px rgba(167,139,250,${.6 * g}),0 0 ${32 * g}px rgba(124,58,237,${.4 * g})`;
      document.querySelectorAll('.memory-ring').forEach(r => { r.style.animationDuration = (3 - (v / 100) * 2) + 's' });
    }
    updateMem();
    memoryOrb.addEventListener('mousedown', e => { memDrag = true; memStartY = e.clientY; memStartVal = state.memory; e.preventDefault() });
    window.addEventListener('mousemove', e => { if (!memDrag) return; state.memory = Math.max(0, Math.min(100, memStartVal + (memStartY - e.clientY) * .5)); updateMem() });
    window.addEventListener('mouseup', () => { memDrag = false });

    // Focus
    document.querySelectorAll('.focus-option').forEach(o => {
      o.addEventListener('click', () => {
        document.querySelectorAll('.focus-option').forEach(x => x.classList.remove('active'));
        o.classList.add('active'); state.focus = o.dataset.focus;
        if (state.focus === 'recent') addTransition('wind', .6); else if (state.focus === 'ancient') addTransition('pulse', 1.2);
      })
    });

    // Toggles
    document.querySelectorAll('.toggle-container').forEach(t => {
      t.addEventListener('click', () => {
        const p = t.dataset.toggle, a = t.classList.toggle('active'); state[p].active = a;
        const k = document.querySelector(`.knob-container[data-param="${p}"]`); a ? k.classList.remove('disabled') : k.classList.add('disabled');
      })
    });

    // Knobs
    document.querySelectorAll('.knob-container').forEach(knob => {
      let drag = false, sy = 0, sv = 0; const p = knob.dataset.param;
      const upd = () => { state[p].value = +knob.dataset.value; knob.querySelector('.knob-indicator').style.transform = `rotate(${-135 + (state[p].value / 100) * 270}deg)` };
      upd();
      knob.addEventListener('mousedown', e => { if (knob.classList.contains('disabled')) return; drag = true; sy = e.clientY; sv = +knob.dataset.value; e.preventDefault() });
      window.addEventListener('mousemove', e => { if (!drag) return; knob.dataset.value = Math.max(0, Math.min(100, sv + (sy - e.clientY) * .5)); upd() });
      window.addEventListener('mouseup', () => { drag = false });
    });

    // Modes
    document.querySelectorAll('[data-modes]').forEach(g => {
      const p = g.dataset.modes, disp = document.querySelector(`[data-mode-display="${p}"]`);
      g.querySelectorAll('.mode-dot').forEach(d => {
        d.addEventListener('click', () => {
          g.querySelectorAll('.mode-dot').forEach(x => { x.classList.remove('active'); x.style.background = '#2a2d36' });
          d.classList.add('active'); d.style.background = d.style.color; state[p].mode = +d.dataset.mode; disp.textContent = d.dataset.name;
          const n = d.dataset.name;
          if (p === 'motion') { if (n === 'PULSE') addTransition('pulse', 1); else if (n === 'FLOW') addTransition('wind', .8); else if (n === 'CHAOS') addTransition('distort', .6) }
          else if (p === 'texture') { if (n === 'CRYSTAL' || n === 'FABRIC') addTransition('grain', .7); else if (n === 'WATER') addTransition('wind', .9) }
          else if (p === 'shape') { if (n === 'GRAIN') addTransition('grain', .8); else if (n === 'DIFFUSE') addTransition('wind', 1) }
        })
      });
    });

    function zoneWeight(x, c, w) { const d = Math.abs(x - c); return d > w ? 0 : Math.cos((d / w) * Math.PI * .5) }

    let t = 0;
    function render() {
      const W = canvas.width, H = canvas.height, ct = performance.now() / 1000;
      const fc = FC[state.focus]; t += .008 * fc.ts;
      ctx.fillStyle = '#0a0b0f'; ctx.fillRect(0, 0, W, H);
      const step = 4, cols = Math.ceil(W / step), rows = Math.ceil(H / step);
      const imgData = ctx.createImageData(W, H), data = imgData.data;
      const te = getTransEffect(ct);
      const mC = MC.motion[state.motion.mode], tC = MC.texture[state.texture.mode], sC = MC.shape[state.shape.mode], pC = MC.space[state.space.mode];
      const mp = state.memory / 100, zw = .25;

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const nx = x / cols, ny = y / rows; let r = 0, g = 0, b = 0;
          let dx = 0, dy = 0;
          if (te.pulse > 0) { const d = Math.sqrt((nx - .5) ** 2 + (ny - .5) ** 2), w = Math.sin(d * 20 - te.pulse * 10) * te.pulse * .05; dx += w * (nx - .5); dy += w * (ny - .5) }
          if (te.wind > 0) dx += Math.sin(ny * 10 + t * 3) * te.wind * .03;
          let ff = 1; if (fc.dc > 0) { const d = Math.sqrt((nx - .5) ** 2 + (ny - .5) ** 2); ff = Math.max(.3, 1 - d * fc.dc * .8) }
          const ax = nx + dx, ay = ny + dy;

          for (const [key, param] of Object.entries(state)) {
            if (key === 'focus' || key === 'memory' || !param.active) continue;
            const zc = (param.zone + .5) / 4, wt = zoneWeight(ax, zc, zw); if (wt < .01) continue;
            const mix = param.value / 100;
            let spM = 1, scM = 1, tu = 0, br = 1, co = 1, gr = 0, sh = 1, di = 0, sp = 1, de = 1;
            if (key === 'motion') { spM = mC.sp; scM = mC.sc; tu = mC.tu } else if (key === 'texture') { br = tC.br; co = tC.co; gr = tC.gr } else if (key === 'shape') { sh = sC.sh; di = sC.di } else if (key === 'space') { sp = pC.sp; de = pC.de }
            let vA = perlinA.noise(ax * 2 * scM * sp, ay * 2 * scM * sp, t * .15 * spM);
            let vB = perlinB.noise(ax * (5 + mix * 3) * scM, ay * (5 + mix * 3) * scM, t * (.5 + mix * .5) * spM);
            if (tu > 0) { const tb = perlinA.noise(ax * 8, ay * 8, t * 2) * tu; vA += tb; vB += tb }
            let v = vA * (1 - mix) + vB * mix;
            if (mp > .3) { v += perlinA.noise(ax * 2, ay * 2, t * .1) * mp * .2 + perlinB.noise(ax * 1.5, ay * 1.5, t * .05) * mp * .15 }
            if (fc.dc > .3) v += perlinA.noise(ax * 1.5, ay * 1.5, t * .05) * fc.dc * .3;
            v = Math.sign(v) * Math.pow(Math.abs(v), 1 / sh);
            if (di > 0) v = v * (1 - di) + perlinB.noise(ax * 3, ay * 3, t * .5) * di;
            let I = Math.max(0, Math.min(1, ((v + 1) / 2 - .5) * co + .5) * br);
            if (gr > 0 || te.grain > 0) I += perlinB.noise(ax * 20, ay * 20, t * 5) * (gr + te.grain) * .2;
            I *= (.7 + de * .3) * ff;
            r += param.color[0] * I * wt; g += param.color[1] * I * wt; b += param.color[2] * I * wt;
          }
          for (let ddy = 0; ddy < step && y * step + ddy < H; ddy++) { for (let ddx = 0; ddx < step && x * step + ddx < W; ddx++) { const idx = ((y * step + ddy) * W + (x * step + ddx)) * 4; data[idx] = Math.min(255, Math.max(0, r)); data[idx + 1] = Math.min(255, Math.max(0, g)); data[idx + 2] = Math.min(255, Math.max(0, b)); data[idx + 3] = 255 } }
        }
      }
      ctx.putImageData(imgData, 0, 0);
      const grad = ctx.createRadialGradient(W / 2, H / 2, W * .25, W / 2, H / 2, W * .6); grad.addColorStop(0, 'rgba(0,0,0,0)'); grad.addColorStop(1, 'rgba(0,0,0,0.5)'); ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
      requestAnimationFrame(render);
    }
    render();
  </script>
</body>

</html>
